<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colour Quad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0d;--surface:#1a1917;--card:#211f1d;
  --border:rgba(255,255,255,0.07);--text:#f0ede8;
  --text-muted:rgba(240,237,232,0.45);--accent:#c8a882;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

.nav{display:flex;align-items:center;padding:0 1.5rem;height:52px;
  background:rgba(15,14,13,0.92);backdrop-filter:blur(10px);
  border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50}
.nav-logo{font-family:var(--serif);font-size:13px;letter-spacing:.14em;color:var(--text-muted)}
.nav-logo span{color:var(--text);font-weight:500}

.screen{display:none;flex-direction:column;align-items:center;min-height:calc(100vh - 52px)}
.progress-bar{width:100%;max-width:420px;height:2px;background:var(--border);margin:4px auto 0}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;width:0%}
.phase-header{width:100%;max-width:420px;display:flex;align-items:center;
  justify-content:space-between;padding:1.2rem 1.5rem .6rem}
.phase-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--accent)}
.phase-progress{font-family:var(--mono);font-size:10px;color:var(--text-muted)}

.card-wrap{flex:1;display:flex;align-items:center;justify-content:center;
  padding:1rem 1.5rem 0;width:100%}
.card{width:100%;max-width:360px;border-radius:20px;overflow:hidden;
  border:0.5px solid var(--border);background:var(--card);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  aspect-ratio:1;min-height:200px;animation:cardIn .2s ease}
@keyframes cardIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.swatch-cell{width:100%;height:100%;min-height:50px}

.actions{display:flex;gap:10px;padding:1.2rem 1.5rem;width:100%;max-width:420px}
.btn-undo,.btn-skip,.btn-like{
  padding:13px;border-radius:12px;border:0.5px solid var(--border);
  font-family:var(--mono);font-size:11px;letter-spacing:.04em;cursor:pointer;transition:all .15s}
.btn-undo{background:none;color:var(--text-muted);flex-shrink:0;padding:13px 16px;font-size:13px}
.btn-undo[disabled]{opacity:.2;cursor:default}
.btn-undo:not([disabled]):hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-skip{background:none;color:var(--text-muted);flex:1}
.btn-skip:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-like{background:var(--accent);color:var(--bg);border-color:var(--accent);flex:1.4}
.btn-like:hover{opacity:.85}
.btn-like.liked{background:none;color:var(--accent)}

/* ── Diag result ── */
.result-diag-inner{width:100%;max-width:500px;padding:2rem 1.5rem 3rem;
  display:flex;flex-direction:column;gap:1.6rem}
.rd-heading{font-family:var(--serif);font-size:26px;font-weight:300;letter-spacing:.06em}
.rd-comment{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:.03em;line-height:1.9}
.rd-section-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:.6rem}
.mini-card{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  width:60px;height:60px;border-radius:10px;overflow:hidden;
  border:0.5px solid var(--border);flex-shrink:0}
.mini-card div{width:100%;height:100%}
.diag-liked-row{display:flex;gap:8px;flex-wrap:wrap}
.tone-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--card);border:0.5px solid var(--border);border-radius:10px}
.tone-pill-swatches{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  width:28px;height:28px;border-radius:4px;overflow:hidden;flex-shrink:0}
.tone-pill-swatches div{width:100%;height:100%}
.tone-pill span{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--text-muted)}
.tone-bar{display:flex;gap:8px;flex-wrap:wrap}
.btn-continue{width:100%;padding:14px;border-radius:12px;
  background:var(--accent);color:var(--bg);border:none;
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;transition:opacity .15s}
.btn-continue:hover{opacity:.85}

/* ── Rec ── */
.rec-finish-wrap{width:100%;max-width:420px;padding:0 1.5rem .5rem;text-align:right}
.btn-finish{background:none;border:none;font-family:var(--mono);font-size:10px;
  color:var(--text-muted);letter-spacing:.06em;cursor:pointer;padding:4px 0}
.btn-finish:hover{color:var(--accent)}

/* ── Result ── */
.result-inner{width:100%;max-width:600px;padding:2rem 1.5rem 4rem;
  display:flex;flex-direction:column;gap:1.6rem}
.result-title{font-family:var(--serif);font-size:28px;font-weight:300;letter-spacing:.06em}
.result-sub{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.06em}
.result-section-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:.8rem}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.result-item{border-radius:14px;overflow:hidden;border:0.5px solid var(--border);background:var(--card)}
.result-swatches{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;aspect-ratio:1.1}
.result-swatches div{width:100%;height:100%}
.result-meta{padding:9px 11px 11px}
.result-brand{font-family:var(--mono);font-size:8px;letter-spacing:.1em;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:3px}
.result-name{font-family:var(--serif);font-size:14px;font-weight:300;
  color:var(--text);line-height:1.2}
.result-no{font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-top:2px}

/* similar section */
.result-item{position:relative}
.sim-like-btn{
  position:absolute;top:6px;right:6px;
  background:rgba(15,14,13,0.65);backdrop-filter:blur(4px);
  border:0.5px solid var(--border);border-radius:50%;
  width:26px;height:26px;font-size:11px;
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
.sim-like-btn:hover{color:var(--accent);border-color:var(--accent)}
.sim-like-btn.liked{background:var(--accent);color:var(--bg);border-color:var(--accent)}

.similar-divider{width:100%;height:0.5px;background:var(--border)}

.share-block{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1.2rem}
.share-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:.8rem}
.share-text{font-family:var(--mono);font-size:11px;color:var(--text);
  line-height:1.9;white-space:pre-wrap;letter-spacing:.02em}
.btn-copy{margin-top:1rem;width:100%;padding:11px;border-radius:10px;
  border:0.5px solid var(--border);background:none;color:var(--text-muted);
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.btn-copy:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-copy.copied{color:var(--accent);border-color:var(--accent)}
.result-btns{display:flex;gap:10px}
.btn-retry{flex:1;padding:12px;border-radius:12px;border:0.5px solid var(--border);
  background:none;color:var(--text-muted);font-family:var(--mono);font-size:11px;
  letter-spacing:.06em;cursor:pointer;transition:all .15s;text-align:center}
.btn-retry:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.empty-likes{font-family:var(--mono);font-size:11px;color:var(--text-muted);
  letter-spacing:.06em;text-align:center;padding:2rem 0;line-height:2}
</style>
</head>

<!-- ════ START ════ -->
<div id="screen-start" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 52px);padding:2rem 1.5rem">
  <div style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:1.6rem">
    <div>
      <div style="font-family:var(--serif);font-size:32px;font-weight:300;letter-spacing:.08em;color:var(--text);margin-bottom:.4rem"><span style="color:var(--accent)">Colour</span> Quad</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.1em">eyeshadow palette finder</div>
    </div>
    <div style="font-family:var(--sans);font-size:13px;color:var(--text);line-height:1.9;letter-spacing:.01em">
      好きな色を選ぶだけで、あなたに似合うデパコスのアイシャドウパレットを提案するアプリです。YSL・NARS・LUNASOL など10ブランド、全117パレットを収録しています。<br><br>
      まずは20問、♡かスキップで答えてみてください。
    </div>
    <button onclick="document.getElementById('screen-start').style.display='none';startDiag();"
      style="width:100%;padding:15px;border-radius:12px;background:var(--accent);color:var(--bg);
      border:none;font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;
      transition:opacity .15s"
      onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
      診断をはじめる →
    </button>
    <div style="font-family:var(--mono);font-size:9px;color:var(--text-muted);line-height:1.9;letter-spacing:.04em;border-top:0.5px solid var(--border);padding-top:1.2rem">

    </div>
  </div>
</div>

<!-- ════ DIAG ════ -->
<div id="screen-diag" class="screen">
  <div class="phase-header">
    <div class="phase-label">診断中</div>
    <div class="phase-progress" id="diag-progress-text"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="diag-progress-fill"></div></div>
  <div class="card-wrap" id="diag-card-wrap"></div>
  <div class="actions">
    <button class="btn-undo" id="btn-diag-undo" disabled>↩</button>
    <button class="btn-skip" id="btn-diag-skip">スキップ</button>
    <button class="btn-like" id="btn-diag-like">♡</button>
  </div>
</div>

<!-- ════ DIAG RESULT ════ -->
<div id="screen-result-diag" class="screen">
  <div class="result-diag-inner">
    <div><div class="rd-heading">診断結果</div></div>
    <div>
      <div class="rd-section-label">♡ したパレット</div>
      <div class="diag-liked-row" id="diag-liked-preview"></div>
    </div>
    <div>

      <div class="tone-bar" id="diag-tone-bar"></div>
    </div>
    <div class="rd-comment" id="diag-comment"></div>
    <button class="btn-continue" id="btn-continue">この傾向でおすすめを見る →</button>
  </div>
</div>

<!-- ════ REC ════ -->
<div id="screen-rec" class="screen">
  <div class="phase-header">
    <div class="phase-label">おすすめ</div>
    <div class="phase-progress" id="rec-progress-text"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="rec-progress-fill"></div></div>
  <div class="card-wrap" id="rec-card-wrap"></div>
  <div class="actions">
    <button class="btn-undo" id="btn-rec-undo" disabled>↩</button>
    <button class="btn-skip" id="btn-rec-skip">スキップ</button>
    <button class="btn-like" id="btn-rec-like">♡</button>
  </div>
  <div class="rec-finish-wrap">
    <button class="btn-finish" id="btn-rec-finish">結果を見る →</button>
  </div>
</div>

<!-- ════ RESULT ════ -->
<div id="screen-result-rec" class="screen">
  <div class="result-inner">
    <div>
      <div class="result-title" id="rec-result-count"></div>
      <div class="result-sub">お気に入りパレット</div>
    </div>
    <div class="result-grid" id="rec-result-grid"></div>

    <div id="rec-similar-section">

        <div class="result-section-label">これも好きかも</div>

    </div>

    <div class="share-block" id="rec-share-block">

      <button class="btn-copy" id="btn-copy">コピー</button>
    </div>
    <div class="result-btns">
      <button class="btn-retry" id="btn-retry">もう一度診断する</button>
    </div>
  </div>
</div>

// ── HSV変換 & ヒストグラム ──
function hexToHsv(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const d = max - min;
  let h = 0;
  if (d > 0) {
    if (max === r)      h = ((g-b)/d + (g<b?6:0)) / 6;
    else if (max === g) h = ((b-r)/d + 2) / 6;
    else                h = ((r-g)/d + 4) / 6;
  }
  return [h, max>0 ? d/max : 0, max];
}

function paletteToHsvVec(palette) {
  // H: 8bins, S: 4bins, V: 4bins → 16次元ベクトル
  const H_BINS=8, S_BINS=4, V_BINS=4;
  const vec = new Array(H_BINS + S_BINS + V_BINS).fill(0);
  for (const hex of palette.colors) {
    const [h,s,v] = hexToHsv(hex);
    vec[Math.min(Math.floor(h * H_BINS), H_BINS-1)]++;
    vec[H_BINS + Math.min(Math.floor(s * S_BINS), S_BINS-1)]++;
    vec[H_BINS + S_BINS + Math.min(Math.floor(v * V_BINS), V_BINS-1)]++;
  }
  // 正規化
  const norm = Math.sqrt(vec.reduce((s,v)=>s+v*v,0)) || 1;
  return vec.map(v => v/norm);
}

function cosineSim(a, b) {
  let dot=0, na=0, nb=0;
  for (let i=0;i<a.length;i++) { dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return dot / (Math.sqrt(na)*Math.sqrt(nb) || 1);
}

// パレットベクトルをキャッシュ
const PALETTE_VECS = PALETTES.map(p => paletteToHsvVec(p));

function getSimilar(likedPalettes, excludeKeys, topN=10) {
  if (likedPalettes.length === 0) return [];
  // 好みベクトル = ♡パレットのベクトル平均
  const dim = PALETTE_VECS[0].length;
  const prefVec = new Array(dim).fill(0);
  for (const p of likedPalettes) {
    const idx = PALETTES.findIndex(x => x.brand===p.brand && x.name===p.name);
    if (idx >= 0) PALETTE_VECS[idx].forEach((v,i) => prefVec[i] += v);
  }
  const norm = Math.sqrt(prefVec.reduce((s,v)=>s+v*v,0)) || 1;
  prefVec.forEach((_,i) => prefVec[i] /= norm);

  // excludeKeysに含まれないパレットとの類似度計算
  return PALETTES
    .map((p,i) => ({p, sim: cosineSim(PALETTE_VECS[i], prefVec)}))
    .filter(({p}) => !excludeKeys.has(p.brand+'|'+p.name))
    .sort((a,b) => b.sim - a.sim)
    .slice(0, topN)
    .map(({p}) => p);
}

// ── Helpers ──
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function hexLightness(hex) {
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return 0.2126*r+0.7152*g+0.0722*b;
}
function paletteLightness(p) { return p.colors.reduce((s,c)=>s+hexLightness(c),0)/p.colors.length; }

// ── PHASE 1: Diagnosis (20枚) ──
function startDiag() {
  diagQueue=[]; diagIdx=0; diagLiked=[]; diagSkipped=[]; recLiked=[];

  // tone比率を保ちつつ、明度×彩度の高低をバランスよくランダムに20枚選ぶ
  const DIAG_PER_TONE = {pink:5, nude:5, brown:4, cool:3, earth:3};

  function paletteSaturation(p) {
    return p.colors.reduce((sum, hex) => {
      const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      return sum + (max > 0 ? (max-min)/max : 0);
    }, 0) / p.colors.length;
  }

  const picks = [];
  Object.entries(DIAG_PER_TONE).forEach(([tone, n]) => {
    const pool = PALETTES.filter(p => p.tags[0] === tone);
    // 明度×彩度の4象限に分類
    const medL = pool.map(p => paletteLightness(p)).sort((a,b)=>a-b)[Math.floor(pool.length/2)];
    const medS = pool.map(p => paletteSaturation(p)).sort((a,b)=>a-b)[Math.floor(pool.length/2)];
    const quads = [
      pool.filter(p => paletteLightness(p) >= medL && paletteSaturation(p) >= medS), // 明・高彩度
      pool.filter(p => paletteLightness(p) >= medL && paletteSaturation(p) <  medS), // 明・低彩度
      pool.filter(p => paletteLightness(p) <  medL && paletteSaturation(p) >= medS), // 暗・高彩度
      pool.filter(p => paletteLightness(p) <  medL && paletteSaturation(p) <  medS), // 暗・低彩度
    ];
    // 各象限からランダムに1枚ずつ取り、n枚になるまで残りをランダム補充
    const selected = new Set();
    quads.forEach(q => {
      const candidates = shuffle(q).filter(p => !selected.has(p));
      if (candidates.length > 0) selected.add(candidates[0]);
    });
    // n枚に満たない場合はランダムに補充
    const rest = shuffle(pool.filter(p => !selected.has(p)));
    let i = 0;
    while (selected.size < n && i < rest.length) selected.add(rest[i++]);
    picks.push(...selected);
  });
  diagQueue = shuffle(picks);

  showScreen('screen-diag');
  showDiagCard();
}

  diagLiked.forEach(p=>{toneWeights[p.tags[0]]=(toneWeights[p.tags[0]]||1)+3;});
  diagSkipped.forEach(p=>{toneWeights[p.tags[0]]=Math.max(0.2,(toneWeights[p.tags[0]]||1)-0.5);});

  if(diagLiked.length>0){
    const avgL=diagLiked.reduce((s,p)=>s+paletteLightness(p),0)/diagLiked.length;
    lightnessDir=avgL>0.45?'light':avgL<0.28?'dark':'neutral';
  }

  const sorted=Object.entries(toneWeights).sort((a,b)=>b[1]-a[1]);
  const top1=sorted[0][0], top2=sorted[1][0];
  const lightComment=lightnessDir==='light'?'明るめ・透明感のある':lightnessDir==='dark'?'こなれた深みのある':'';
  let comment='';
  if(diagLiked.length===0) comment='まだ好みが掴めていません。もう少し試してみましょう！';
  else if(diagLiked.length>=3) comment=`${lightComment}${TONE_META[top1].jp}がお好みのようです。${TONE_META[top2].jp}も気になっていそうですね。`;
  else comment=`${lightComment}${TONE_META[top1].jp}に惹かれる傾向があります。`;

  const preview=document.getElementById('diag-liked-preview');
  preview.innerHTML=diagLiked.length>0
    ?diagLiked.map(p=>`<div class="mini-card">${p.colors.map(c=>`<div style="background:${c}"></div>`).join('')}</div>`).join('')
    :'<p style="font-family:var(--mono);font-size:10px;color:var(--text-muted)">♡なし</p>';

  document.getElementById('diag-comment').textContent=comment;

  const toneBar=document.getElementById('diag-tone-bar');
  toneBar.innerHTML=sorted.slice(0,3).map(([tone])=>`
    <div class="tone-pill">

  showScreen('screen-result-diag');
}

// ── リアルタイム好みベクトル ──
let recPool      = [];  // 未見パレットのプール
let recPrefVec   = [];  // リアルタイム更新される好みベクトル
let recShown     = [];  // 表示済みパレット（undo用）
const REC_LIMIT  = 20;  // 最大表示枚数

function buildPrefVec(liked, skipped) {
  const dim = PALETTE_VECS[0].length;
  const vec = new Array(dim).fill(0);
  // diagLikedをベースに
  for (const p of liked) {
    const idx = PALETTES.findIndex(x => x.brand===p.brand && x.name===p.name);
    if (idx >= 0) PALETTE_VECS[idx].forEach((v,i) => vec[i] += v);
  }
  // skipは半分の重みで引き算
  for (const p of skipped) {
    const idx = PALETTES.findIndex(x => x.brand===p.brand && x.name===p.name);
    if (idx >= 0) PALETTE_VECS[idx].forEach((v,i) => vec[i] -= v * 0.5);
  }
  const norm = Math.sqrt(vec.reduce((s,v)=>s+v*v,0)) || 1;
  return vec.map(v => v/norm);
}

function nextBestFromPool() {
  if (recPool.length === 0) return null;
  // 好みベクトルが空（diagLiked=0）ならランダム
  if (recPrefVec.every(v=>v===0)) return recPool.splice(Math.floor(Math.random()*recPool.length), 1)[0];
  let bestIdx=0, bestSim=-Infinity;
  recPool.forEach((p,i) => {
    const pidx = PALETTES.findIndex(x=>x.brand===p.brand&&x.name===p.name);
    const sim = pidx>=0 ? cosineSim(PALETTE_VECS[pidx], recPrefVec) : 0;
    if (sim > bestSim) { bestSim=sim; bestIdx=i; }
  });
  return recPool.splice(bestIdx, 1)[0];
}

function startRec() {
  recHistory=[]; recLiked=[...diagLiked];
  recShown=[];

  const diagSeenKeys=new Set(diagQueue.map(p=>p.brand+'|'+p.name));
  recPool = shuffle(PALETTES.filter(p=>!diagSeenKeys.has(p.brand+'|'+p.name)));
  recPrefVec = buildPrefVec(diagLiked, diagSkipped);

  showScreen('screen-rec');
  showRecCard();
}

function showRecCard() {
  if (recShown.length >= REC_LIMIT || recPool.length === 0) { showRecResult(); return; }
  const p = nextBestFromPool();
  if (!p) { showRecResult(); return; }
  recShown.push(p);

  renderCard('rec-card-wrap', p);
  const done = recShown.length;
  document.getElementById('rec-progress-fill').style.width = (done/REC_LIMIT*100)+'%';
  document.getElementById('rec-progress-text').textContent = `${done} / ${REC_LIMIT}`;
  const likeBtn=document.getElementById('btn-rec-like');
  likeBtn.classList.remove('liked'); likeBtn.textContent='♡';
  document.getElementById('btn-rec-undo').disabled = recHistory.length===0;
}

function showRecResult() {
  const allLiked=recLiked;
  const likedKeys=new Set(allLiked.map(p=>p.brand+'|'+p.name));
  const diagSeenKeys=new Set(diagQueue.map(p=>p.brand+'|'+p.name));
  const excludeKeys=new Set([...likedKeys,...diagSeenKeys,...recShown.map(p=>p.brand+'|'+p.name)]);

  // ♡した一覧
  const grid=document.getElementById('rec-result-grid');
  if(allLiked.length===0){
    grid.innerHTML=`<div class="empty-likes" style="grid-column:1/-1">お気に入りが見つかりませんでした。もう一度試してみて！</div>`;
  } else {
    grid.innerHTML=allLiked.map(p=>`
      <div class="result-item">
        <div class="result-swatches">${p.colors.map(c=>`<div style="background:${c}"></div>`).join('')}</div>
        <div class="result-meta">
          <div class="result-brand">${p.brand}</div>
          <div class="result-name">${p.name}</div>
          ${p.no?`<div class="result-no">No.${p.no}</div>`:''}
        </div>
      </div>`).join('');
  }

  // これも好きかも（HSVで近い10枚）
  simLiked = [];
  const similar=getSimilar(allLiked, excludeKeys, 10);
  const simGrid=document.getElementById('rec-similar-grid');
  if(similar.length===0||allLiked.length===0){
    document.getElementById('rec-similar-section').style.display='none';
  } else {
    document.getElementById('rec-similar-section').style.display='block';
    simGrid.innerHTML=similar.map((p,i)=>`
      <div class="result-item">
        <div class="result-swatches">${p.colors.map(c=>`<div style="background:${c}"></div>`).join('')}</div>
        <div class="result-meta">
          <div class="result-brand">${p.brand}</div>
          <div class="result-name">${p.name}</div>
          ${p.no?`<div class="result-no">No.${p.no}</div>`:''}
        </div>
        <button class="sim-like-btn" data-idx="${i}" onclick="toggleSimLike(this,${i})">♡</button>
      </div>`).join('');
    // similarをwindowにキャッシュ
    window._similar = similar;
  }

  // シェアテキスト（♡ + simLikedを合わせて更新）
  updateShareText(allLiked);

  document.getElementById('rec-result-count').textContent=allLiked.length>0?`♡ ${allLiked.length}`:'結果';
  document.getElementById('btn-retry').onclick=()=>startDiag();
  showScreen('screen-result-rec');
}


// ── Similar like toggle ──
function toggleSimLike(btn, idx) {
  const p = window._similar[idx];
  if (!p) return;
  const key = p.brand+'|'+p.name;
  const alreadyLiked = simLiked.findIndex(x => x.brand+'|'+x.name === key);
  if (alreadyLiked >= 0) {
    simLiked.splice(alreadyLiked, 1);
    btn.classList.remove('liked');
    btn.textContent = '♡';
  } else {
    simLiked.push(p);
    btn.classList.add('liked');
    btn.textContent = '♡';
  }
  updateShareText(recLiked);
}

function updateShareText(allLiked) {
  const shareBlock = document.getElementById('rec-share-block');
  const combined = [...allLiked, ...simLiked];
  if (combined.length > 0) {
    const lines = combined.map(p => `${p.brand}  ${p.name}${p.no?' No.'+p.no:''}`);
    document.getElementById('rec-share-text').textContent = '#colour_quad\nhttps://seu-yu.github.io/colour_quad/\n\n' + lines.join('\n');
    shareBlock.style.display = 'block';
  } else {
    shareBlock.style.display = 'none';
  }
}

  const prev=recHistory.pop();
  // プールに戻す
  recPool.unshift(recShown.pop());
  // prefVec を巻き戻す
  const pidx=PALETTES.findIndex(x=>x.brand===prev.p.brand&&x.name===prev.p.name);
  if(pidx>=0){
    if(prev.liked){
      recLiked=recLiked.filter(p=>p!==prev.p);
      PALETTE_VECS[pidx].forEach((v,i)=>recPrefVec[i]-=v);
    } else {
      PALETTE_VECS[pidx].forEach((v,i)=>recPrefVec[i]+=v*0.5);
    }
    const norm=Math.sqrt(recPrefVec.reduce((s,v)=>s+v*v,0))||1;
    recPrefVec=recPrefVec.map(v=>v/norm);
  }
  showRecCard();
});
document.getElementById('btn-rec-finish').addEventListener('click',()=>showRecResult());

// startDiag はスタート画面のボタンから呼ばれる
});

</script>
